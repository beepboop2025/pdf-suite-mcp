<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" font-family="Georgia, 'Times New Roman', Times, serif" role="img" aria-label="pdf-suite-mcp">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAB98"/><stop offset="55%" stop-color="#E7C7D2"/><stop offset="100%" stop-color="#A1ECFF"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="a" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A1ECFF" stop-opacity="0.20"/><stop offset="55%" stop-color="#FFAB98" stop-opacity="0.09"/><stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A1ECFF" stop-opacity="0"/><stop offset="50%" stop-color="#A1ECFF" stop-opacity="0.30"/><stop offset="100%" stop-color="#A1ECFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="300" rx="16" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1278" height="298" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  <ellipse cx="900" cy="150" rx="430" ry="300" fill="url(#a)">
    <animateTransform attributeName="transform" type="translate" values="0 0;-36 22;0 0" dur="11s" repeatCount="indefinite"/>
  </ellipse>
  <g opacity="1">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.1s"/>
    <animateTransform attributeName="transform" type="translate" dur="1s" begin="0.1s" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="0 22;0 0"/>
    <line x1="74" y1="66" x2="116" y2="66" stroke="#6a6a6a" stroke-width="1"/>
    <text x="128" y="71" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="5" fill="#C7C7C7">AI / MCP</text>
    <rect x="74" y="96" width="56" height="56" fill="none" stroke="#FAFAFA" stroke-width="5">
      <animate attributeName="stroke-opacity" values="1;0.45;1" dur="3.6s" repeatCount="indefinite"/>
    </rect>
    <text x="150" y="143" font-size="64" fill="#FAFAFA" letter-spacing="-1">pdf-suite-mcp</text>
    <text x="74" y="214" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a9a9a">An MCP server with 37 tools to read, build, merge, watermark, redact &amp;</text><text x="74" y="244" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a9a9a">fill PDFs</text>
    
  </g>
  <rect x="0" y="0" width="220" height="300" fill="url(#s)" opacity="0.45">
    <animateTransform attributeName="transform" type="translate" from="-240 0" to="1300 0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
